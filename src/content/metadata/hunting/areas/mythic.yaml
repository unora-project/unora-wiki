description: >-
  Mythic is an area comprised of 10 themed "mini" areas, each with their own leader.
  Each leader stands outside of their enemy's territory. You can make an alliance with
  up to 5 leaders, allowing those you've allied with to claim victory once you've completed their quest.
leaders:
  - npc: Horse Leader
    area: Floppy Farms
    minimumLevel: "Bunny 1: 9+, Bunny 2: 41+, Bunny 3: 71+"
  - npc: King Mantis
    area: Garden
    minimumLevel: "Bee 1: 14+, Bee 2: 46+, Bee 3: 76+"
  - npc: Bee Queen
    area: Woodlands
    minimumLevel: "Mantis 1: 21+, Mantis 2: 51+, Mantis 3: 80+"
