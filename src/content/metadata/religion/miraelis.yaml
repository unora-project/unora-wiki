name: Miraelis
subtitle: One of four remaining Goddesses of Unora. Holds nature highly.
location: Mileth
description: >-
  Compassion lies at the core of my essence, guiding my interactions and teaching.
  It is through empathy and kindness that we connect with others, offering solace and support
  to those in need. Nature, too, holds a significant place within my realm. I advocate for the
  preservation and sustainable coexistence with the natural world. Intellect is a vital aspect
  of my teachings. I encourage the pursuit of knowledge, the sharpening of one's mind, and the
  quest for understanding.
blessingBonus: 10% Healing Bonus and 15% Crafting Success rate
