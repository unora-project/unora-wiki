name: Theselene
subtitle: One of four remaining Goddesses of Unora. Holds knowledge and intuition highly.
location: Rucesion
description: >-
  The shadows conceal the deepest truths, and it is in the realm of secrets that I reside.
  My essence grants insight and intuition, unraveling mysteries and guiding those who dare to
  delve into the unknown. In the realm of shadows and secrets, knowledge is power. By delving
  into hidden truths and embracing the depths of our intuition, we unlock the potential within
  ourselves.
blessingBonus: Immunity to all Cradh curses
