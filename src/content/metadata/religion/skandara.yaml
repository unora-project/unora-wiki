name: Skandara
subtitle: One of four remaining Goddesses of Unora. Holds strength and discipline highly.
location: Piet
description: >-
  As the goddess of war and strife, my essence embodies strength and strategic prowess.
  Through conflict, we grow and evolve, forging our path with unwavering determination and the
  will to overcome any obstacle. Valor and strategic thinking go hand in hand on the battlefield.
  By combining strength with cunning, we can achieve victory and forge a legacy that echoes
  through the ages.
blessingBonus: 25% improved experience from monster kills
