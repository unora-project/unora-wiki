name: Serendael
subtitle: One of four remaining Goddesses of Unora. Holds luck and intellect highly.
location: Suomi
description: >-
  Luck is my domain, and the fickle hand of fortune is my ally. Within chaos lies opportunity,
  and it is through embracing the unpredictable nature of life that we can shape our destiny
  and grasp the bountiful gifts that await us. By embracing the power of understanding
  probabilities, making calculated decisions, and seizing opportune moments, we can ride the
  waves of chance.
blessingBonus: 25% improved gold and drop rates
